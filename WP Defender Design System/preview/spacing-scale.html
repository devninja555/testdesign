<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .scale{display:flex;align-items:flex-end;gap:6px}
  .bar{background:var(--brand-purple);border-radius:2px}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);margin-top:6px;text-align:center}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:.08em;margin:0 0 12px}
</style></head>
<body>
<p class="label">Spacing scale · 5 · 10 · 15 · 20 · 30 · 40 · 60</p>
<div class="scale">
  <div><div class="bar" style="width:5px;height:5px"></div><div class="cap">5</div></div>
  <div><div class="bar" style="width:10px;height:10px"></div><div class="cap">10</div></div>
  <div><div class="bar" style="width:15px;height:15px"></div><div class="cap">15</div></div>
  <div><div class="bar" style="width:20px;height:20px"></div><div class="cap">20</div></div>
  <div><div class="bar" style="width:30px;height:30px"></div><div class="cap">30</div></div>
  <div><div class="bar" style="width:40px;height:40px"></div><div class="cap">40</div></div>
  <div><div class="bar" style="width:60px;height:60px"></div><div class="cap">60</div></div>
</div>
</body></html>
