<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .input{height:40px;border:1px solid var(--ink-800-15);border-radius:10px;padding:0 14px;font-size:14px;font-family:inherit;width:260px;background:#fff;color:var(--fg-1)}
  .input:focus{outline:2px solid var(--brand-indigo);outline-offset:-1px;border-color:transparent}
  .input.disabled{background:var(--ink-100);color:var(--ink-200);pointer-events:none}
  .row{display:flex;gap:10px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
  .check{width:20px;height:20px;border-radius:100px;border:1px solid var(--ink-800-15);background:#fff;display:inline-flex;align-items:center;justify-content:center}
  .check.on{background:var(--ink-800);border-color:var(--ink-800)}
  .check.on svg{color:#fff}
  .radio{width:20px;height:20px;border-radius:100%;border:1px solid var(--ink-800-15);background:#fff;display:inline-flex;align-items:center;justify-content:center}
  .radio.on::after{content:"";width:10px;height:10px;border-radius:100%;background:var(--ink-800)}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:.08em;margin:0 0 6px}
</style></head>
<body>
<p class="label">Text inputs</p>
<div class="row">
  <input class="input" placeholder="you@domain.com">
  <input class="input disabled" value="locked@field.com">
</div>
<p class="label">Checkbox · Radio</p>
<div class="row">
  <span class="check"></span>
  <span class="check on"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
  <span class="radio"></span>
  <span class="radio on"></span>
</div>
</body></html>
