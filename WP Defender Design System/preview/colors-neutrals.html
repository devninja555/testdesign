<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Core</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{border-radius:10px;overflow:hidden;border:1px solid var(--border-default)}
  .chip{height:70px}
  .meta{padding:8px 10px;background:var(--white)}
  .name{font-size:12px;font-weight:500;color:var(--fg-1);line-height:1.3}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);margin-top:2px}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="name">Ink 900</div><div class="hex">#090909</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="meta"><div class="name">Ink 800 · text</div><div class="hex">#1A1A1A</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><div class="name">Ink 700 · wp bar</div><div class="hex">#222222</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="meta"><div class="name">Ink 500 · fg-2</div><div class="hex">#666666</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-200)"></div><div class="meta"><div class="name">Ink 200 · disabled</div><div class="hex">#CCCCCC</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-150)"></div><div class="meta"><div class="name">Ink 150 · border</div><div class="hex">#E6E6E6</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-100)"></div><div class="meta"><div class="name">Ink 100 · subtle</div><div class="hex">#F2F2F2</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-50)"></div><div class="meta"><div class="name">Ink 50 · canvas</div><div class="hex">#F8F8F8</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--white);border-top:1px solid var(--border-default)"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--black)"></div><div class="meta"><div class="name">Black · sidebar</div><div class="hex">#000000</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><div class="meta"><div class="name">Ink 600</div><div class="hex">#2D3338</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><div class="meta"><div class="name">Ink 300</div><div class="hex">#B5BCC2</div></div></div>
</div>
</body></html>
