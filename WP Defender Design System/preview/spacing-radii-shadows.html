<!doctype html>
<html><head><meta charset="utf-8"><title>Radii & Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  .tile{width:70px;height:70px;background:var(--ink-100);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--fg-2)}
  .shadow-tile{width:80px;height:56px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--fg-2)}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);text-transform:uppercase;letter-spacing:.08em;margin:0 0 6px}
</style></head>
<body>
<p class="label">Radius scale</p>
<div class="row">
  <div class="tile" style="border-radius:2px">2</div>
  <div class="tile" style="border-radius:5px">5</div>
  <div class="tile" style="border-radius:10px">10</div>
  <div class="tile" style="border-radius:15px">15</div>
  <div class="tile" style="border-radius:20px">20</div>
  <div class="tile" style="border-radius:25px">25</div>
  <div class="tile" style="border-radius:1020px">pill</div>
</div>
<p class="label">Shadows</p>
<div class="row" style="background:var(--ink-50);padding:16px;border-radius:8px">
  <div class="shadow-tile" style="box-shadow:var(--shadow-xs)">xs</div>
  <div class="shadow-tile" style="box-shadow:var(--shadow-sm)">sm</div>
  <div class="shadow-tile" style="box-shadow:var(--shadow-md)">md</div>
  <div class="shadow-tile" style="box-shadow:var(--shadow-lg)">lg</div>
</div>
</body></html>
