<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display & body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff}
  .spec{display:grid;grid-template-columns:80px 1fr;gap:16px 24px;align-items:baseline}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);padding-top:10px}
  hr{border:0;border-top:1px solid var(--border-default);margin:14px 0}
</style></head>
<body>
<div class="spec">
  <div class="label">H1 · 50</div><div class="h1">99.8% clean.</div>
  <div class="label">H2 · 32</div><div class="h2">Security actions required</div>
  <div class="label">H3 · 24</div><div class="h3">Last scan: 2 hours ago</div>
  <div class="label">H4 · 18</div><div class="h4">Known vulnerability</div>
  <div class="label">Body · 14</div><div class="body">Defender detected 9 issues across your site. Review and take action in the dashboard.</div>
  <div class="label">Caption · 11</div><div class="caption">Last scanned 12:04 PM · 1m ago</div>
</div>
</body></html>
