<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
  .ic{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px;border:1px solid var(--border-default);border-radius:10px}
  .ic img{width:24px;height:24px;color:var(--ink-800)}
  .ic span{font-family:var(--font-mono);font-size:9px;color:var(--fg-2)}
</style></head>
<body>
<div class="grid">
  <div class="ic"><img src="../assets/defender-shield.svg"><span>shield</span></div>
  <div class="ic"><img src="../assets/icons/shield-check.svg"><span>shield-ok</span></div>
  <div class="ic"><img src="../assets/icons/warning-triangle.svg"><span>warn</span></div>
  <div class="ic"><img src="../assets/icons/lock.svg"><span>lock</span></div>
  <div class="ic"><img src="../assets/icons/firewall.svg"><span>firewall</span></div>
  <div class="ic"><img src="../assets/icons/scan.svg"><span>scan</span></div>
  <div class="ic"><img src="../assets/icons/dashboard.svg"><span>dash</span></div>
  <div class="ic"><img src="../assets/icons/info-circle.svg"><span>info</span></div>
  <div class="ic"><img src="../assets/icons/caret-down.svg"><span>caret</span></div>
  <div class="ic"><img src="../assets/icons/arrow-right.svg"><span>arrow</span></div>
  <div class="ic"><img src="../assets/icons/check.svg"><span>check</span></div>
  <div class="ic"><img src="../assets/icons/user.svg"><span>user</span></div>
  <div class="ic"><img src="../assets/icons/bell.svg"><span>bell</span></div>
  <div class="ic"><img src="../assets/icons/clock.svg"><span>clock</span></div>
  <div class="ic"><img src="../assets/icons/activity.svg"><span>activity</span></div>
  <div class="ic"><img src="../assets/icons/settings-cog.svg"><span>cog</span></div>
</div>
</body></html>
