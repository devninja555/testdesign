<!doctype html>
<html><head><meta charset="utf-8"><title>Logos</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);display:flex;gap:24px;flex-wrap:wrap;align-items:center}
  .box{display:flex;align-items:center;gap:12px;padding:14px 18px;border:1px solid var(--border-default);border-radius:14px;min-width:260px}
  .box.dark{background:var(--ink-800);color:#fff;border-color:transparent}
  .box.dark .title{color:#fff}
  .box .sh{width:34px;height:34px;border-radius:13.6px;background:var(--ink-800);display:flex;align-items:center;justify-content:center;color:#fff}
  .box.dark .sh{background:#fff;color:var(--ink-800)}
  .title{font-size:18px;font-weight:400;color:var(--fg-1)}
  .sub{font-size:11px;color:var(--fg-2);letter-spacing:.1px}
  .box.dark .sub{color:rgba(255,255,255,.7)}
  .wp{display:flex;align-items:center;gap:6px;color:var(--fg-1)}
  .box.dark .wp{color:#fff}
</style></head>
<body>
<div class="box">
  <div class="sh"><img src="../assets/defender-shield.svg" width="16" height="16" style="filter:invert(1)"></div>
  <div><div class="title">Defender</div><div class="sub">By WPMU DEV</div></div>
</div>
<div class="box dark">
  <div class="sh"><img src="../assets/defender-shield.svg" width="16" height="16"></div>
  <div><div class="title">Defender</div><div class="sub">By WPMU DEV</div></div>
</div>
<div class="box">
  <div class="wp"><img src="../assets/wpmudev-logo.svg" width="18" height="16"><span style="font-weight:500">WPMU DEV</span></div>
</div>
</body></html>
